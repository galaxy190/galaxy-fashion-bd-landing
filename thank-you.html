<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Received - Galaxy Fashion BD</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Thank You Page Start -->
  <section class="thank-you-page">
    <div class="thank-you-card">

      <div class="thank-you-icon">
        <img src="assets/check.png" alt="Order Success Icon">
      </div>

      <h1>ধন্যবাদ!</h1>
      <h2>আপনার অর্ডার সফলভাবে গ্রহণ করা হয়েছে</h2>

      <p>
        আমাদের টিম খুব শীঘ্রই আপনার মোবাইল নম্বরে যোগাযোগ করবে।
        অর্ডার কনফার্ম হওয়ার পর পণ্য ডেলিভারি করা হবে।
      </p>

      <div class="thank-you-info">
        <div class="thank-you-info-item">
          <img src="assets/icon-fast-delivery.svg" alt="Delivery Icon">
          <span>ঢাকার ভিতরে: ১-২ দিন</span>
        </div>

        <div class="thank-you-info-item">
          <img src="assets/icon-fast-delivery.svg" alt="Delivery Icon">
          <span>ঢাকার বাইরে: ৩-৪ দিন</span>
        </div>

        <div class="thank-you-info-item">
          <img src="assets/icon-cash-on-delivery.svg" alt="Cash On Delivery Icon">
          <span>Cash On Delivery Available</span>
        </div>
      </div>

      <a href="/" class="thank-you-btn">হোম পেজে ফিরে যান</a>

    </div>
  </section>
  <!-- Thank You Page End -->

</body>
</html>
